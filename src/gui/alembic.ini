# Alembic configuration for the dnlab-gui auth DB.
#
# The live database URL is resolved at runtime from
# `app.config.settings.AUTH_DATABASE_URL` by `alembic/env.py`; leaving
# `sqlalchemy.url` blank here keeps the secret out of version control.
# Override via `DNLABGUI_AUTH_DATABASE_URL` env var.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
