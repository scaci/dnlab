# dNLab GUI — Apache reverse proxy vhost (M7 fase 2: RBAC).
#
# Proxies HTTPS → 127.0.0.1:8080. The FastAPI app owns authentication
# from here on (session cookies, backed by the local_db auth backend);
# this vhost just terminates TLS and forwards requests and WebSockets.
#
# Browsers loading the UI from https://<FQDN> send
# `Origin: https://<FQDN>`; that origin MUST be in the allowlist
# DNLABGUI_ALLOWED_ORIGINS on the GUI systemd unit, otherwise WS
# handshakes close with code 4403 ("bad origin"). See /opt/dnlab/docs/ADMIN_GUIDE.md.
#
# Placeholders to edit:
#   dnlab.my-net.cloud       — public GUI hostname
#   *.dnlab.my-net.cloud     — wildcard WebUI host suffix
#   me@you.com               — ServerAdmin contact
#
# Required modules: ssl proxy proxy_http proxy_wstunnel rewrite headers

# ── HTTP → HTTPS redirect ────────────────────────────────────────────
<VirtualHost *:80>
    ServerName dnlab.my-net.cloud
    ServerAlias *.dnlab.my-net.cloud
    ServerAdmin me@you.com

    # ACME HTTP-01 carve-out: leave /.well-known/acme-challenge/
    # reachable over plain HTTP for certbot/Let's Encrypt.
    Alias "/.well-known/acme-challenge/" "/var/www/acme-challenge/"
    <Directory "/var/www/acme-challenge/">
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*) https://%{HTTP_HOST}/$1 [R=301,L]

    ErrorLog  ${APACHE_LOG_DIR}/dnlab-gui-error.log
    CustomLog ${APACHE_LOG_DIR}/dnlab-gui-access.log combined
</VirtualHost>

# ── HTTPS vhost (the real proxy) ─────────────────────────────────────
<VirtualHost *:443>
    ServerName dnlab.my-net.cloud
    ServerAlias *.dnlab.my-net.cloud
    ServerAdmin me@you.com

    # ── TLS ─────────────────────────────────────────────────────────
    # Public WebUI host-based proxying needs a certificate covering:
    #   DNS:dnlab.my-net.cloud
    #   DNS:*.dnlab.my-net.cloud
    # Let's Encrypt wildcards require DNS-01 validation.
    SSLEngine on
    SSLCertificateFile      /etc/ssl/dnlab/dnlab-gui.crt
    SSLCertificateKeyFile   /etc/ssl/dnlab/dnlab-gui.key
    # Uncomment when using a CA-issued cert with an intermediate chain:
    # SSLCertificateChainFile /etc/ssl/dnlab/dnlab-gui-chain.crt

    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLHonorCipherOrder     on
    SSLCipherSuite          HIGH:!aNULL:!MD5:!3DES
    SSLSessionTickets       off

    # HSTS — 6 months; remove the preload flag if you're not submitting
    # the domain to the HSTS preload list.
    Header always set Strict-Transport-Security "max-age=15768000; includeSubDomains"

    # Sensible extra hardening headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ── Local service page (served by Apache, not by the GUI proxy) ──
    # Used when the backend on 127.0.0.1:8080 is down/restarting.
    Alias "/_dnlab_service/" "/opt/dnlab/src/gui/deploy/apache/error/"
    Alias "/_dnlab_service_assets/" "/opt/dnlab/src/gui/app/views/static/img/"
    <Directory "/opt/dnlab/src/gui/deploy/apache/error/">
        Require all granted
    </Directory>
    <Directory "/opt/dnlab/src/gui/app/views/static/img/">
        Require all granted
    </Directory>
    ErrorDocument 502 /_dnlab_service/service-unavailable.html
    ErrorDocument 503 /_dnlab_service/service-unavailable.html
    ErrorDocument 504 /_dnlab_service/service-unavailable.html

    # ── Reverse proxy ───────────────────────────────────────────────
    ProxyRequests      Off
    ProxyPreserveHost  On
    # Long timeout: deploy/destroy events stream for several minutes
    # while the orchestrator runs. 3600s covers the slowest worst case.
    ProxyTimeout       3600

    # WebSocket endpoints MUST be matched before the catch-all, otherwise
    # the generic HTTP proxy handler swallows the Upgrade handshake.
    # The GUI exposes /ws/console/<lab_id>/<node>, /ws/logs/<lab_id>/<node>,
    # /ws/events/<lab_id>. A single prefix rule covers all of them.
    ProxyPass         "/_dnlab_service/" "!"
    ProxyPass         "/_dnlab_service_assets/" "!"

    # Host-based WebUI tunnels may use WebSocket paths anywhere under
    # their dedicated wildcard host. Handle every Upgrade before the
    # generic HTTP catch-all.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://127.0.0.1:8080/$1 [P,L]

    ProxyPass         "/ws/" "ws://127.0.0.1:8080/ws/"
    ProxyPassReverse  "/ws/" "ws://127.0.0.1:8080/ws/"

    # HTTP catch-all for REST + static assets.
    ProxyPass         "/" "http://127.0.0.1:8080/"
    ProxyPassReverse  "/" "http://127.0.0.1:8080/"

    # FastAPI issues Set-Cookie with Secure+HttpOnly+SameSite=Lax (see
    # app/views/api/auth_routes.py). The proxy already preserves the
    # cookie headers verbatim — these directives are here so that if you
    # ever change the internal bind to a different path prefix the
    # cookie Path/Domain rewrites stay consistent.
    ProxyPassReverseCookiePath   "/" "/"
    ProxyPassReverseCookieDomain "127.0.0.1" "dnlab.my-net.cloud"

    # Forwarded headers so FastAPI / access logs see the real client.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host  "%{HTTP_HOST}e" env=HTTP_HOST

    # ── Logs ────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/dnlab-gui-error.log
    CustomLog ${APACHE_LOG_DIR}/dnlab-gui-access.log combined
    LogLevel  warn
</VirtualHost>
