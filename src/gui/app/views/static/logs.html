<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dNLab Logs</title>
  <link rel="icon" type="image/svg+xml" href="/img/brand/09-favicon-64.svg">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      overflow: hidden;
    }
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      background: #151529;
      border-bottom: 1px solid #2a2a3e;
      height: 34px;
      box-sizing: border-box;
    }
    #header .title { font-size: 13px; font-weight: 600; color: #00d4ff; }
    #header .sub   { font-size: 12px; color: #8a8ab0; }
    #header .status {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #2a2a3e;
      color: #aaa;
    }
    #header .status.ok  { background: #0d4f2d; color: #7aff9a; }
    #header .status.err { background: #4f0d1a; color: #ff8aa2; }

    #log {
      position: absolute;
      top: 34px; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      padding: 6px 12px;
      box-sizing: border-box;
      font-family: 'Fira Mono', 'Cascadia Code', monospace;
      font-size: 12.5px;
      line-height: 1.55;
      background: #0d0d1a;
    }
    .log-line       { white-space: pre-wrap; word-break: break-word; }
    .log-line:hover { background: rgba(255,255,255,0.04); }
    .log-line-warn  { color: #ffcb6b; }
    .log-line-err   { color: #ff5370; }
  </style>
</head>
<body>
<div id="header">
  <span class="title" id="hdr-node">…</span>
  <span class="sub"   id="hdr-lab">…</span>
  <span class="status" id="hdr-status">connecting…</span>
</div>
<div id="log"></div>

<script src="/js/logs_tab.js"></script>
</body>
</html>
