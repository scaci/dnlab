name: dnlab
services:
  proxy:
    image: ${DNLAB_IMAGE_PREFIX:?set DNLAB_IMAGE_PREFIX in .env}dnlab-proxy:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    depends_on:
      gui:
        condition: service_healthy
    environment:
      DNLAB_PROXY_MODE: tls
      DNLAB_PROXY_SERVER_NAME: ${DNLAB_PROXY_SERVER_NAME:?set DNLAB_PROXY_SERVER_NAME}
      DNLAB_PROXY_WEBUI_SUFFIX: ${DNLAB_PROXY_SERVER_NAME:?set DNLAB_PROXY_SERVER_NAME}
      DNLAB_PROXY_SERVER_ADMIN: ${DNLAB_PROXY_SERVER_ADMIN:-dnlab@example.invalid}
      DNLAB_PROXY_CERT_FILE: ${DNLAB_PROXY_CERT_FILE:-/etc/ssl/dnlab/dnlab-gui.crt}
      DNLAB_PROXY_CERT_KEY_FILE: ${DNLAB_PROXY_CERT_KEY_FILE:-/etc/ssl/dnlab/dnlab-gui.key}
    ports:
      - "${DNLAB_PROXY_HTTP_PORT:-80}:80"
      - "${DNLAB_PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ${DNLAB_PROXY_TLS_DIR:-/etc/ssl/dnlab}:/etc/ssl/dnlab:ro
      - ${DNLAB_PROXY_ACME_DIR:-/var/www/acme-challenge}:/var/www/acme-challenge
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  gui:
    image: ${DNLAB_IMAGE_PREFIX:?set DNLAB_IMAGE_PREFIX in .env}dnlab-gui:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    command: ["sh", "-c", "alembic upgrade head && python run.py"]
    depends_on:
      auth-db:
        condition: service_healthy
      multinode:
        condition: service_healthy
      image-build:
        condition: service_healthy
    environment:
      DNLABGUI_HOST: 0.0.0.0
      DNLABGUI_PORT: "8080"
      DNLAB_MULTINODE_API_URL: http://multinode:8081
      DNLAB_IMAGE_BUILD_API_URL: http://image-build:8082
      DNLAB_VERSION: ${DNLAB_VERSION:?set DNLAB_VERSION in .env}
      DNLAB_RUNTIME_IMAGE_PREFIX: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}
      DNLAB_MULTINODE_HOSTS: /etc/dnlab/hosts.yml
      TOPOLOGIES_DIR: ${DNLAB_TOPOLOGIES_DIR:-/root/dnlab-topologies}
      DNLABGUI_ALLOWED_ORIGINS: ${DNLABGUI_ALLOWED_ORIGINS:-https://${DNLAB_PROXY_SERVER_NAME:?set DNLAB_PROXY_SERVER_NAME}}
      DNLABGUI_WEBUI_HOST_SUFFIX: ${DNLAB_PROXY_SERVER_NAME:?set DNLAB_PROXY_SERVER_NAME}
      DNLABGUI_AUTH_DATABASE_URL: ${DNLABGUI_AUTH_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-dnlab_gui}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@auth-db:5432/${POSTGRES_DB:-dnlab_auth}}
    volumes:
      - ${DNLAB_CONFIG_DIR:-/etc/dnlab}:/etc/dnlab:ro
      - ${DNLAB_TOPOLOGIES_DIR:-/root/dnlab-topologies}:${DNLAB_TOPOLOGIES_DIR:-/root/dnlab-topologies}
      - ${DNLAB_PERSIST_ROOT:-/var/lib/docker/dnlab-backups}:${DNLAB_PERSIST_ROOT:-/var/lib/docker/dnlab-backups}
      - ${DNLAB_LOG_DIR_GUI:-/var/log/dnlab-gui}:${DNLAB_LOG_DIR_GUI:-/var/log/dnlab-gui}
      - ${DNLAB_SSH_DIR:-/root/.ssh}:/root/.ssh:ro
    # Reach the per-lab jumphosts' SSH ports published on the master host
    # (Web UI tunnels + console/log). The GUI shares no docker network
    # with those jumphosts, so it connects via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      internal:
        aliases:
          - dnlab-gui
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=3).read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  auth-seed:
    image: ${DNLAB_IMAGE_PREFIX:?set DNLAB_IMAGE_PREFIX in .env}dnlab-gui:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    profiles:
      - seed-admin
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DNLABGUI_AUTH_DATABASE_URL: ${DNLABGUI_AUTH_DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-dnlab_gui}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@auth-db:5432/${POSTGRES_DB:-dnlab_auth}}
      DNLABGUI_BOOTSTRAP_ADMIN_USERNAME: ${DNLABGUI_BOOTSTRAP_ADMIN_USERNAME:-}
      DNLABGUI_BOOTSTRAP_ADMIN_PASSWORD: ${DNLABGUI_BOOTSTRAP_ADMIN_PASSWORD:-}
    volumes:
      - ${DNLAB_CONFIG_DIR:-/etc/dnlab}:/etc/dnlab:ro
      - ${DNLAB_SSH_DIR:-/root/.ssh}:/root/.ssh:ro
    command:
      - sh
      - -c
      - |
        alembic upgrade head
        if [ -z "$$DNLABGUI_BOOTSTRAP_ADMIN_USERNAME" ] || [ -z "$$DNLABGUI_BOOTSTRAP_ADMIN_PASSWORD" ]; then
          echo "set DNLABGUI_BOOTSTRAP_ADMIN_USERNAME and DNLABGUI_BOOTSTRAP_ADMIN_PASSWORD"
          exit 2
        fi
        python scripts/seed_admin.py \
          --username "$$DNLABGUI_BOOTSTRAP_ADMIN_USERNAME" \
          --password "$$DNLABGUI_BOOTSTRAP_ADMIN_PASSWORD"
    networks:
      - internal
    restart: "no"

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dnlab_auth}
      POSTGRES_USER: ${POSTGRES_USER:-dnlab_gui}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - auth-pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dnlab_gui} -d $${POSTGRES_DB:-dnlab_auth}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  multinode:
    image: ${DNLAB_IMAGE_PREFIX:?set DNLAB_IMAGE_PREFIX in .env}dnlab-multinode:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    privileged: true
    environment:
      DNLAB_MULTINODE_API_HOST: 0.0.0.0
      DNLAB_MULTINODE_API_PORT: "8081"
      DNLAB_IMAGE_SYNC_API_URL: http://image-sync:8083
      DNLAB_VERSION: ${DNLAB_VERSION:?set DNLAB_VERSION in .env}
      DNLAB_RUNTIME_IMAGE_PREFIX: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}
    volumes:
      - ${DNLAB_CONFIG_DIR:-/etc/dnlab}:/etc/dnlab:ro
      - ${DNLAB_SSH_DIR:-/root/.ssh}:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DNLAB_TOPOLOGIES_DIR:-/root/dnlab-topologies}:${DNLAB_TOPOLOGIES_DIR:-/root/dnlab-topologies}
      - ${DNLAB_PERSIST_ROOT:-/var/lib/docker/dnlab-backups}:${DNLAB_PERSIST_ROOT:-/var/lib/docker/dnlab-backups}
      - ${DNLAB_LOG_DIR_MULTINODE:-/var/log/dnlab-multinode}:${DNLAB_LOG_DIR_MULTINODE:-/var/log/dnlab-multinode}
      - ${DNLAB_TMP_DIR:-/tmp}:${DNLAB_TMP_DIR:-/tmp}
      - ${DNLAB_CONTAINERLAB_BIN:-/usr/bin/containerlab}:/usr/bin/containerlab:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=3).read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  image-sync:
    image: ${DNLAB_IMAGE_PREFIX:?set DNLAB_IMAGE_PREFIX in .env}dnlab-multinode:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    command: ["dnlab-image-sync", "start"]
    depends_on:
      - multinode
    environment:
      DNLAB_MULTINODE_HOSTS: /etc/dnlab/hosts.yml
      DNLAB_IMAGE_SYNC_API_HOST: 0.0.0.0
      DNLAB_IMAGE_SYNC_API_PORT: "8083"
      DNLAB_VERSION: ${DNLAB_VERSION:?set DNLAB_VERSION in .env}
      DNLAB_RUNTIME_IMAGE_PREFIX: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}
    volumes:
      - ${DNLAB_CONFIG_DIR:-/etc/dnlab}:/etc/dnlab:ro
      - ${DNLAB_SSH_DIR:-/root/.ssh}:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - image-sync-state:/var/lib/dnlab-image-sync
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/health', timeout=3).read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  lab-cleanup:
    image: ${DNLAB_IMAGE_PREFIX:?set DNLAB_IMAGE_PREFIX in .env}dnlab-lab-cleanup:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    depends_on:
      - multinode
    volumes:
      - ${DNLAB_CONFIG_DIR:-/etc/dnlab}:/etc/dnlab:ro
      - ${DNLAB_SSH_DIR:-/root/.ssh}:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DNLAB_TOPOLOGIES_DIR:-/root/dnlab-topologies}:${DNLAB_TOPOLOGIES_DIR:-/root/dnlab-topologies}
      - ${DNLAB_PERSIST_ROOT:-/var/lib/docker/dnlab-backups}:${DNLAB_PERSIST_ROOT:-/var/lib/docker/dnlab-backups}
      - ${DNLAB_LOG_DIR_MULTINODE:-/var/log/dnlab-multinode}:${DNLAB_LOG_DIR_MULTINODE:-/var/log/dnlab-multinode}
      - ${DNLAB_LAB_CLEANUP_STATE_DIR:-/var/lib/dnlab-lab-cleanup}:/var/lib/dnlab-lab-cleanup
      - ${DNLAB_TMP_DIR:-/tmp}:${DNLAB_TMP_DIR:-/tmp}
      - ${DNLAB_CONTAINERLAB_BIN:-/usr/bin/containerlab}:/usr/bin/containerlab:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "dnlab-lab-cleanup status --json >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  image-build:
    image: ${DNLAB_IMAGE_PREFIX:?set DNLAB_IMAGE_PREFIX in .env}dnlab-image-build:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    environment:
      DNLAB_IMAGE_BUILD_API_HOST: 0.0.0.0
      DNLAB_IMAGE_BUILD_API_PORT: "8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DNLAB_IMAGE_BUILD_WORKSPACE:-/var/lib/dnlab-image-build}:/var/lib/dnlab-image-build
      - ${DNLAB_VRNETLAB_DIR:-/opt/vrnetlab}:/opt/vrnetlab
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/health', timeout=3).read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  release-jumphost-image:
    image: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}jumphost:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    profiles:
      - release-images
    entrypoint: ["sh", "-c", "exit 0"]
    network_mode: "none"
    restart: "no"

  release-dns-image:
    image: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}dns:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    profiles:
      - release-images
    entrypoint: ["sh", "-c", "exit 0"]
    network_mode: "none"
    restart: "no"

  release-runtime-relay-image:
    image: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}runtime-relay:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    profiles:
      - release-images
    entrypoint: ["sh", "-c", "exit 0"]
    network_mode: "none"
    restart: "no"

  release-realnet-router-image:
    image: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}realnet-router:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    profiles:
      - release-images
    entrypoint: ["sh", "-c", "exit 0"]
    network_mode: "none"
    restart: "no"

  release-realnet-rr-image:
    image: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}realnet-rr:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    profiles:
      - release-images
    entrypoint: ["sh", "-c", "exit 0"]
    network_mode: "none"
    restart: "no"

  release-mgmt-anchor-image:
    image: ${DNLAB_RUNTIME_IMAGE_PREFIX:?set DNLAB_RUNTIME_IMAGE_PREFIX in .env}mgmt-anchor:${DNLAB_VERSION:?set DNLAB_VERSION in .env}
    profiles:
      - release-images
    entrypoint: ["sh", "-c", "exit 0"]
    network_mode: "none"
    restart: "no"

networks:
  internal:

volumes:
  auth-pgdata:
  image-sync-state:
