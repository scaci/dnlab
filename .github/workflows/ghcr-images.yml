name: GHCR images

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Push images to GHCR
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
      - plus
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: scaci

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dnlab-gui
            image: dnlab-gui
            context: src/gui
            dockerfile: src/gui/Dockerfile
            plus_tag: plus
          - name: dnlab-proxy
            image: dnlab-proxy
            context: src/gui
            dockerfile: src/gui/deploy/apache/Dockerfile
            plus_tag: dnlab-proxy-plus
          - name: dnlab-multinode
            image: dnlab-multinode
            context: src/multinode
            dockerfile: src/multinode/Dockerfile
            plus_tag: plus
          - name: dnlab-lab-cleanup
            image: dnlab-lab-cleanup
            context: src/multinode
            dockerfile: src/multinode/Dockerfile.cleanup
            plus_tag: plus
          - name: dnlab-jumphost
            image: dnlab-jumphost
            context: src/multinode/jumphost
            dockerfile: src/multinode/jumphost/Dockerfile
            plus_tag: plus
          - name: dnlab-dns
            image: dnlab-dns
            context: src/multinode/dns
            dockerfile: src/multinode/dns/Dockerfile
            plus_tag: plus
          - name: dnlab-runtime-relay
            image: dnlab-runtime-relay
            context: src/multinode/runtime-relay
            dockerfile: src/multinode/runtime-relay/Dockerfile
            plus_tag: plus
          - name: dnlab-realnet-router
            image: dnlab-realnet-router
            context: src/multinode/realnet-router
            dockerfile: src/multinode/realnet-router/Dockerfile
            plus_tag: plus
          - name: dnlab-realnet-rr
            image: dnlab-realnet-rr
            context: src/multinode/realnet-rr
            dockerfile: src/multinode/realnet-rr/Dockerfile
            plus_tag: plus
          - name: dnlab-mgmt-anchor
            image: dnlab-mgmt-anchor
            context: src/multinode/mgmt-anchor
            dockerfile: src/multinode/mgmt-anchor/Dockerfile
            plus_tag: plus
          - name: dnlab-image-build
            image: dnlab-image-build
            context: src/image-build
            dockerfile: src/image-build/Dockerfile
            plus_tag: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.source=https://github.com/scaci/dnlab
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ matrix.plus_tag }},enable=${{ github.ref == 'refs/heads/plus' && matrix.plus_tag != '' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
