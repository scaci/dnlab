services:
  proxy:
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  gui:
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run

  auth-seed:
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run

  auth-db:
    security_opt:
      - no-new-privileges:true

  image-build:
    security_opt:
      - no-new-privileges:true

  lab-cleanup:
    security_opt:
      - no-new-privileges:true

  image-sync:
    security_opt:
      - no-new-privileges:true
